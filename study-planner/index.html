<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Planner & Finance</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <header class="glass-header">
            <div class="top-bar">
                <div class="logo-area" id="logoArea" onclick="openSettings()">
                    <span class="material-symbols-rounded logo-icon" id="mainIcon">edit_calendar</span>
                    <h1 id="mainTitle">Planner</h1>
                    <span style="font-size: 12px; opacity: 0.3; margin-left:5px;">✏️</span>
                </div>
                <button class="icon-btn" id="settingsBtn" onclick="openSettings()">
                    <span class="material-symbols-rounded">settings</span>
                </button>
            </div>

            <div class="day-selector" id="daySelector"></div>
        </header>

        <main id="mainContent">
            <div id="plannerTab" class="tab-content">
            </div>

            <div id="financeTab" class="tab-content" style="display:none;">
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" data-tab="planner" id="navPlanner">
                <span class="material-symbols-rounded">calendar_month</span>
                <span>시간표</span>
            </div>
            <div class="nav-item" data-tab="finance" id="navFinance">
                <span class="material-symbols-rounded">account_balance_wallet</span>
                <span>가계부</span>
            </div>
        </nav>
    </div>

    <div id="settingsModal" class="modal-overlay"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; backdrop-filter:blur(5px);">
        <div class="modal-content"
            style="background:white; width:300px; margin:20% auto; padding:25px; border-radius:25px; position:relative;">
            <button onclick="closeSettings()"
                style="position:absolute; right:20px; top:20px; border:none; background:none; font-size:24px; cursor:pointer;">&times;</button>
            <h2 style="margin-top:0; font-size:20px;">설정</h2>

            <div style="margin-bottom:20px;">
                <label style="font-size:12px; font-weight:bold; color:#666;">앱 제목 ✏️</label>
                <input type="text" id="modalTitleInput"
                    style="width:100%; padding:10px; margin-top:5px; border:1px solid #eee; border-radius:10px; box-sizing:border-box;">
            </div>

            <hr style="border:0; border-top:1px solid #f5f5f5; margin:20px 0;">

            <div>
                <label style="font-size:12px; font-weight:bold; color:#666;">클라우드 관리 ☁️</label>
                <div id="syncStatus" style="font-size:11px; color:#999; margin:5px 0 10px 0;">로그인이 필요합니다.</div>
                <button id="authBtn" onclick="handleAuth()"
                    style="width:100%; padding:12px; background:#4a90e2; color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">
                    구글 계정 연결하기
                </button>
                <button id="syncBtn" onclick="syncData()"
                    style="display:none; width:100%; padding:12px; background:#34a853; color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">
                    지금 구글에 백업하기
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gsiLoaded()"></script>

    <script>
        // 설정창 제어 스크립트
        function openSettings() {
            document.getElementById('settingsModal').style.display = 'block';
            document.getElementById('modalTitleInput').value = document.getElementById('mainTitle').innerText;
        }
        function closeSettings() {
            const newTitle = document.getElementById('modalTitleInput').value;
            if (newTitle) {
                document.getElementById('mainTitle').innerText = newTitle;
                localStorage.setItem('planner_title', newTitle);
            }
            document.getElementById('settingsModal').style.display = 'none';
        }
    </script>
</body>

</html>
