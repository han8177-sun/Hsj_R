<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아들을 위한 스마트 플래너</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <header class="glass-header">
            <div class="top-bar">
                <div class="logo-area" onclick="openSettings()">
                    <span class="material-symbols-rounded" style="color:#4a90e2; font-size:28px;">edit_document</span>
                    <h1 id="mainTitle">Planner</h1>
                    <span style="font-size: 12px; opacity: 0.3;">✏️</span>
                </div>
                <button class="icon-btn" id="settingsBtn" onclick="openSettings()">
                    <span class="material-symbols-rounded">settings</span>
                </button>
            </div>

            <div class="day-selector" id="daySelector"></div>
        </header>

        <main id="mainContent">
            <div id="plannerTab" class="tab-content">
            </div>

            <div id="financeTab" class="tab-content" style="display:none;">
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" data-tab="planner" id="navPlanner">
                <span class="material-symbols-rounded">calendar_month</span>
                <span>시간표</span>
            </div>
            <div class="nav-item" data-tab="finance" id="navFinance">
                <span class="material-symbols-rounded">account_balance_wallet</span>
                <span>가계부</span>
            </div>
        </nav>
    </div>

    <div id="settingsModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <button class="close-btn" onclick="closeSettings()">&times;</button>
            <h2 style="margin-top:0;">설정</h2>
            <div class="setting-section">
                <label>플래너 이름 ✏️</label>
                <input type="text" id="modalTitleInput" class="title-input">
            </div>
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            <div class="setting-section">
                <label>클라우드 관리 ☁️</label>
                <button id="authBtn" class="google-btn" onclick="handleAuth()"
                    style="background:#4a90e2; color:white; border:none; padding:12px; width:100%; border-radius:12px; font-weight:bold; cursor:pointer;">
                    구글 계정 연결하기
                </button>
                <button id="syncBtn" class="google-btn" onclick="syncData()"
                    style="display:none; background:#34a853; color:white; border:none; padding:12px; width:100%; border-radius:12px; font-weight:bold; cursor:pointer;">
                    지금 구글에 백업하기
                </button>
                <p id="syncStatus" style="font-size:12px; color:#999; text-align:center; margin-top:10px;">로그인이 필요합니다.
                </p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gsiLoaded()"></script>

    <script>
        // 설정창 열기/닫기 기능 (index.html 전용)
        function openSettings() {
            document.getElementById('settingsModal').style.display = 'block';
            document.getElementById('modalTitleInput').value = document.getElementById('mainTitle').innerText;
        }
        function closeSettings() {
            const newTitle = document.getElementById('modalTitleInput').value;
            if (newTitle) {
                document.getElementById('mainTitle').innerText = newTitle;
                localStorage.setItem('planner_title', newTitle);
            }
            document.getElementById('settingsModal').style.display = 'none';
        }
    </script>
</body>

</html>
